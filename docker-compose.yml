version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: wtf-livepulse-db
    environment:
      POSTGRES_DB: wtf_livepulse
      POSTGRES_USER: wtf
      POSTGRES_PASSWORD: wtf_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtf"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wtf-network

  backend:
    build: ./backend
    container_name: wtf-livepulse-backend
    environment:
      DATABASE_URL: postgres://wtf:wtf_secret@db:5432/wtf_livepulse
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - wtf-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: wtf-livepulse-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3001
    networks:
      - wtf-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  wtf-network:
    driver: bridge